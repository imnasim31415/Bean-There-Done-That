<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Lifecycle Timeline</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
        header { background: #1a1a2e; padding: 1rem 2rem; border-bottom: 2px solid #6c63ff; }
        header h1 { font-size: 1.4rem; color: #a78bfa; }
        nav { background: #16213e; padding: 0.6rem 2rem; display: flex; gap: 1.5rem; border-bottom: 1px solid #222; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; padding: 0.3rem 0; }
        nav a:hover, nav a.active { color: #a78bfa; border-bottom: 2px solid #a78bfa; }
        main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        section { margin-bottom: 3rem; }
        h2 { color: #a78bfa; margin-bottom: 1.2rem; font-size: 1.1rem; font-weight: 500; }
        .timeline { position: relative; padding-left: 2rem; }
        .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: #333; }
        .event { position: relative; margin-bottom: 1.2rem; }
        .event::before { content: ''; position: absolute; left: -1.6rem; top: 0.35rem; width: 10px; height: 10px; border-radius: 50%; background: #6c63ff; border: 2px solid #a78bfa; }
        .event-phase { font-size: 0.7rem; font-family: monospace; color: #6c63ff; text-transform: uppercase; letter-spacing: 0.05em; }
        .event-detail { font-size: 0.88rem; color: #ccc; margin-top: 0.1rem; }
        .event-time { font-size: 0.75rem; color: #555; font-family: monospace; margin-top: 0.1rem; }
        .beans-section table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #1a1a2e; color: #a78bfa; padding: 0.6rem 0.8rem; text-align: left; border-bottom: 2px solid #333; }
        td { padding: 0.5rem 0.8rem; border-bottom: 1px solid #1e1e2e; vertical-align: top; }
        tr:hover td { background: #1a1a2e; }
        .stage { font-size: 0.72rem; padding: 0.1rem 0.4rem; border-radius: 3px; font-family: monospace; }
        .INSTANTIATED        { background: #1e3a2e; color: #34d399; }
        .DEPENDENCIES_INJECTED { background: #1e2a3a; color: #60a5fa; }
        .POST_CONSTRUCT      { background: #2d2b55; color: #a78bfa; }
        .INITIALIZED         { background: #1a2e1a; color: #86efac; }
        .PRE_DESTROY         { background: #3a1a1a; color: #f87171; }
        .bean-name { font-family: monospace; font-size: 0.82rem; color: #a78bfa; }
    </style>
</head>
<body>
<header><h1>☕ Bean There Done That</h1></header>
<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/dashboard/beans">Beans</a>
    <a href="/dashboard/lifecycle" class="active">Lifecycle</a>
    <a href="/debug/startup" target="_blank">API: /debug/startup</a>
</nav>
<main>
    <section>
        <h2>Application Startup Timeline</h2>
        <div class="timeline">
            <div class="event" th:each="e : ${startupTimeline}">
                <div class="event-phase" th:text="${e.phase}"></div>
                <div class="event-detail" th:text="${e.detail}"></div>
                <div class="event-time" th:text="${e.timestamp}"></div>
            </div>
        </div>
    </section>

    <section class="beans-section">
        <h2>Bean Lifecycle Events</h2>
        <table>
            <thead>
            <tr>
                <th>Bean</th>
                <th>Stage</th>
                <th>Timestamp</th>
                <th>Detail</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="bean : ${beans}">
                <tr th:each="evt : ${bean.events}">
                    <td class="bean-name" th:text="${bean.beanName}"></td>
                    <td><span class="stage" th:classappend="${evt.stage}" th:text="${evt.stage}"></span></td>
                    <td style="font-family:monospace;font-size:0.78rem;color:#666;" th:text="${evt.timestamp}"></td>
                    <td th:text="${evt.detail}"></td>
                </tr>
            </th:block>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
