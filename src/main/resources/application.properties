spring.application.name=bean-there-done-that
server.port=8080

# Show full lifecycle in logs
logging.level.com.beanthere=DEBUG
logging.level.org.springframework.beans.factory=INFO

# Expose all actuator endpoints for reference
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Thymeleaf dev mode — disable cache for live editing
spring.thymeleaf.cache=false
